name: Supabase keep-alive

# Free-tier Supabase projects are paused after ~7 days without traffic.
# Ping the REST API twice a week so the database never goes to sleep.
on:
  schedule:
    - cron: "0 12 * * 1,4" # Mondays and Thursdays at 12:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping lessons endpoint
        run: |
          curl --fail --silent --show-error \
            "https://vlthyggdqmqmrgzselpy.supabase.co/rest/v1/lessons?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsdGh5Z2dkcW1xbXJnenNlbHB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNTgxOTYsImV4cCI6MjA5ODgzNDE5Nn0.CMOaM5uarhAhlTTyzoxaByKMsXDQGcYTDoHBqyw455E" \
            > /dev/null
          echo "Supabase pinged successfully"
